server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/badgers}
    username: ${SPRING_DATASOURCE_USERNAME:badgers}
    password: ${SPRING_DATASOURCE_PASSWORD:badgers_dev_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret}
  algorithm: ${JWT_ALGORITHM:HS256}
  issuer: ${JWT_ISSUER:badgers-auth}
  audience: ${JWT_AUDIENCE:badgers-services}
  access-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:30}
  refresh-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}
