<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务看板 - Manus Clone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #fcfcfc;
            color: #1a1a1a;
        }

        /* 侧边栏 (复用通用布局) */
        .sidebar {
            width: 280px;
            background-color: #f7f7f8;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            flex-shrink: 0;
        }
        .sidebar-header {
            margin-bottom: 2rem;
            font-size: 1.25rem;
            font-weight: 700;
            padding: 0 0.5rem;
            color: #1a1a1a;
        }
        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: #4a4a4a;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            margin-bottom: 0.25rem;
            text-decoration: none;
        }
        .nav-item:hover { background-color: #e5e5e5; color: #1a1a1a; }
        .nav-item.active { background-color: #ffffff; color: #1a1a1a; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* 主体内容区 */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            overflow-y: auto;
        }
        .header {
            height: 70px;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5e5;
            background-color: rgba(255,255,255,0.9);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-title { font-size: 1.25rem; font-weight: 600; }

        .content-area {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* 状态概览 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            border: 1px solid #e5e5e5;
            border-radius: 1rem;
            padding: 1.5rem;
            background-color: #fafafa;
        }
        .stat-title { color: #71717a; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; color: #1a1a1a; }

        /* 任务列表 */
        .task-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .task-card {
            border: 1px solid #e5e5e5;
            border-radius: 0.75rem;
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.2s;
        }
        .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .task-info { display: flex; flex-direction: column; gap: 0.5rem; flex-grow: 1; }
        .task-header { display: flex; align-items: center; gap: 1rem; }
        .task-title { font-weight: 600; font-size: 1.05rem; }
        
        /* 状态标签 */
        .badge { padding: 0.25rem 0.6rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 500; }
        .badge-running { background-color: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .badge-waiting { background-color: #fef08a; color: #854d0e; border: 1px solid #fde047; }
        .badge-done { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        .task-meta { color: #71717a; font-size: 0.85rem; display: flex; gap: 1.5rem; }
        
        /* 进度条 */
        .progress-container { width: 100%; max-width: 300px; height: 6px; background-color: #f4f4f5; border-radius: 3px; overflow: hidden; margin-top: 0.25rem;}
        .progress-bar { height: 100%; background-color: #2563eb; border-radius: 3px; transition: width 0.3s; }
        .progress-bar.pulsing { background: linear-gradient(90deg, #2563eb, #60a5fa, #2563eb); background-size: 200% 100%; animation: pulse 2s infinite linear; }

        .task-actions { display: flex; gap: 0.5rem; }
        .btn { padding: 0.4rem 0.75rem; border-radius: 0.5rem; font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid #e5e5e5; background-color: white; color: #1a1a1a; transition: all 0.2s; }
        .btn:hover { background-color: #f4f4f5; }
        .btn-primary { background-color: #1a1a1a; color: white; border-color: #1a1a1a; }
        .btn-primary:hover { background-color: #3f3f46; border-color: #3f3f46; }

        svg { width: 1.25rem; height: 1.25rem; }
        @keyframes pulse { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    </style>
</head>

                        </div>
                        <div class="task-meta">
