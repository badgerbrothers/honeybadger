<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 - Manus Clone</title>
    <style>
        /* 基础重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #fcfcfc;
            color: #1a1a1a;
            overflow: hidden;
        }

        /* 侧边栏 (Manus 紧凑布局) */
        .sidebar {
            width: 260px;
            background-color: #f7f7f8;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .new-chat-btn {
            flex-grow: 1;
            padding: 0.5rem 0.75rem;
            background-color: transparent;
            color: #1a1a1a;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .new-chat-btn:hover { background-color: #e5e5e5; }
        
        .icon-btn-small {
            background: none; border: none; cursor: pointer; color: #71717a; padding: 0.5rem; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn-small:hover { background-color: #e5e5e5; color: #1a1a1a; }

        .chat-history {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.25rem;
        }
        .history-item {
            padding: 0.6rem 0.75rem; border-radius: 0.5rem; cursor: pointer; color: #4a4a4a; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background-color 0.2s;
        }
        .history-item:hover { background-color: #e5e5e5; color: #1a1a1a; }
        
        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid #e5e5e5;
        }
        .user-profile {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem; cursor: pointer; border-radius: 0.5rem; transition: background-color 0.2s;
        }
        .user-profile:hover { background-color: #e5e5e5; }
        .avatar-small {
            width: 32px; height: 32px; border-radius: 50%; background-color: #1a1a1a; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;
        }

        /* 主体内容区 (居中布局) */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #ffffff;
        }

        /* 顶部操作区 (可选) */
        .top-bar {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
        }

        /* 居中欢迎内容 */
        .welcome-center {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .logo-large {
            width: 64px;
            height: 64px;
            margin-bottom: 2rem;
            color: #1a1a1a;
        }

        h1.greeting {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            color: #1a1a1a;
        }

        /* 输入框区域 (强化版) */
        .input-container {
            width: 100%;
            max-width: 700px;
            position: relative;
            background-color: #ffffff;
            border: 1px solid #d4d4d8;
            border-radius: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 0.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 1.5rem;
        }
        .input-container:focus-within {
            border-color: #a1a1aa;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .input-textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            padding: 1rem 1rem 0.5rem 1rem;
            min-height: 56px;
            max-height: 200px;
            outline: none;
            font-family: inherit;
            font-size: 1.05rem;
            color: #1a1a1a;
            line-height: 1.5;
        }
        .input-textarea::placeholder {
            color: #a1a1aa;
        }

        .input-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.25rem 0.5rem;
        }

        .tools-left {
            display: flex;
            gap: 0.25rem;
        }

        .tool-btn {
            background: none;
            border: 1px solid transparent;
            padding: 0.4rem 0.75rem;
            cursor: pointer;
            color: #71717a;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tool-btn:hover { background-color: #f4f4f5; color: #1a1a1a; }
        .tool-btn.active { background-color: #f4f4f5; color: #2563eb; border-color: #e5e5e5; }

        .send-btn {
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .send-btn:hover { background-color: #3f3f46; }
        .send-btn:active { transform: scale(0.95); }

        /* 快捷建议卡片 */
        .suggestions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 700px;
        }
        
        .suggestion-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            color: #4a4a4a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .suggestion-card:hover {
            background-color: #fafafa;
            border-color: #d4d4d8;
            color: #1a1a1a;
            transform: translateY(-1px);
        }

        svg { width: 1.25rem; height: 1.25rem; }
    </style>
</head>
<body>

    <!-- 侧边栏 (Manus 样式) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New chat
            </button>
            <button class="icon-btn-small" title="收起侧边栏">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
            </button>
        </div>
        
        <div style="font-size: 0.75rem; font-weight: 600; color: #a1a1aa; padding: 0 0.5rem 0.5rem;">Today</div>
        <div class="chat-history">
            <div class="history-item">Hacker News 数据抓取与分析</div>
            <div class="history-item">重构 React 组件库</div>
        </div>

        <div style="font-size: 0.75rem; font-weight: 600; color: #a1a1aa; padding: 1.5rem 0.5rem 0.5rem;">Previous 7 Days</div>
        <div class="chat-history" style="flex-grow: 0;">
            <div class="history-item">API 性能优化方案</div>
            <div class="history-item">写一篇关于 AI Agent 的博客</div>
            <div class="history-item">配置 Docker 环境</div>
        </div>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="avatar-small">U</div>
                <span style="font-size: 0.9rem; font-weight: 500;">User Workspace</span>
            </div>
        </div>
    </aside>

    <!-- 主体区域 (居中欢迎页) -->
    <main class="main-content">
        
        <!-- 顶部可选链接 -->
        <div class="top-bar">
            <a href="dashboard.html" style="color: #71717a; text-decoration: none; font-size: 0.9rem;">Dashboard</a>
            <a href="settings.html" style="color: #71717a; text-decoration: none; font-size: 0.9rem;">Settings</a>
        </div>

        <div class="welcome-center">
            <!-- Logo -->
            <svg class="logo-large" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>

            <h1 class="greeting">What can I help you with?</h1>

            <!-- 强化的输入框 -->
            <div class="input-container">
                <textarea class="input-textarea" placeholder="Message Manus..."></textarea>
                
                <div class="input-toolbar">
                    <div class="tools-left">
                        <button class="tool-btn" title="Add attachment">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        </button>
                        <button class="tool-btn active" title="Web Search">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                            Search
                        </button>
                        <button class="tool-btn" title="Python / Code Execution">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                            Code
                        </button>
                    </div>
                    <button class="send-btn" title="Send message" onclick="window.location.href='manus_clone.html'">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                </div>
            </div>

            <!-- 快捷建议 -->
            <div class="suggestions">
                <div class="suggestion-card">
                    <svg style="color: #ea580c;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    Summarize my recent tasks
                </div>
                <div class="suggestion-card">
                    <svg style="color: #2563eb;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Write a python script
                </div>
                <div class="suggestion-card">
                    <svg style="color: #16a34a;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Analyze data from CSV
                </div>
            </div>

        </div>
    </main>

    <script>
        // 输入框自适应高度
        const textarea = document.querySelector('.input-textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value === '') {
                this.style.height = '56px';
            }
        });
    </script>
</body>
</html>
