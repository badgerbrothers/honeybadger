services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-badgers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-badgers_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-badgers}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-badgers} -d ${POSTGRES_DB:-badgers}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-badgers}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-badgers_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: badgers-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  project-service:
    build:
      context: ./services/project-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-badgers}:${POSTGRES_PASSWORD:-badgers_dev_password}@postgres:5432/${POSTGRES_DB:-badgers}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
      STORAGE_SERVICE_URL: http://storage-service:8000
      RAG_SERVICE_URL: http://rag-service:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20

  task-service:
    build:
      context: ./services/task-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-badgers}:${POSTGRES_PASSWORD:-badgers_dev_password}@postgres:5432/${POSTGRES_DB:-badgers}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
      STORAGE_SERVICE_URL: http://storage-service:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20

  rag-service:
    build:
      context: ./services/rag-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-badgers}:${POSTGRES_PASSWORD:-badgers_dev_password}@postgres:5432/${POSTGRES_DB:-badgers}
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20

  storage-service:
    build:
      context: ./services/storage-service
    environment:
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
    ports:
      - "8005:8000"
    depends_on:
      - minio

  api-gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      project-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      storage-service:
        condition: service_started

  worker-taskrun:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: uv run --project /app/worker python -m worker.worker_taskrun
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-badgers}:${POSTGRES_PASSWORD:-badgers_dev_password}@postgres:5432/${POSTGRES_DB:-badgers}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app:/app/worker
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      BACKEND_BASE_URL: http://task-service:8000
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-badgers-sandbox:latest}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-2g}
      SANDBOX_CPU_QUOTA: ${SANDBOX_CPU_QUOTA:-50000}
      WORKER_TYPE: taskrun
      WORKER_MODE: rabbitmq
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      task-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  worker-indexjob:
    build:
      context: .
      dockerfile: worker/Dockerfile
    working_dir: /app
    command: uv run --project /app/worker python -m worker.worker_indexjob
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-badgers}:${POSTGRES_PASSWORD:-badgers_dev_password}@postgres:5432/${POSTGRES_DB:-badgers}
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app:/app/worker
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-password}
      BACKEND_BASE_URL: http://task-service:8000
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-badgers}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-badgers_dev_password}
      S3_BUCKET: ${S3_BUCKET:-badgers-artifacts}
      S3_SECURE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKER_TYPE: indexjob
      WORKER_MODE: rabbitmq
    volumes:
      - ./:/app
    depends_on:
      rag-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_WS_URL: ws://localhost
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api-gateway:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  frontend_node_modules:
