# Development environment only - DO NOT use these credentials in production
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: badgers
      POSTGRES_PASSWORD: badgers_dev_password
      POSTGRES_DB: badgers
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: badgers
      MINIO_ROOT_PASSWORD: badgers_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
