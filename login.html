<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Manus Clone</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f4f5;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
        }

        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .logo {
            width: 48px;
            height: 48px;
            background-color: #1a1a1a;
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p.subtitle { color: #71717a; font-size: 0.95rem; margin-bottom: 2.5rem; }

        .form-group { margin-bottom: 1.25rem; text-align: left; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: #3f3f46; }
        .form-input {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid #d4d4d8; border-radius: 0.75rem; font-size: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26,26,26,0.1); }

        .btn-primary {
            width: 100%; padding: 0.8rem; background-color: #1a1a1a; color: white; border: none; border-radius: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; margin-top: 0.5rem;
        }
        .btn-primary:hover { background-color: #3f3f46; }

        .divider {
            display: flex; align-items: center; text-align: center; margin: 1.5rem 0; color: #a1a1aa; font-size: 0.85rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e5e5; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-oauth {
            width: 100%; padding: 0.75rem; background-color: white; color: #3f3f46; border: 1px solid #d4d4d8; border-radius: 0.75rem; font-size: 0.95rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background-color 0.2s; margin-bottom: 0.75rem;
        }
        .btn-oauth:hover { background-color: #f4f4f5; }

        .footer-text { margin-top: 2rem; font-size: 0.85rem; color: #71717a; }
        .footer-text a { color: #1a1a1a; text-decoration: none; font-weight: 500; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 24px; height: 24px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h1>欢迎回来</h1>
        <p class="subtitle">登录您的 Manus Agent 工作台</p>

        <!-- 模拟跳转到 dashboard.html -->
        <form action="dashboard.html" method="GET">
            <div class="form-group">
                <label class="form-label">邮箱地址</label>
                <input type="email" class="form-input" placeholder="you@company.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <label class="form-label" style="margin-bottom: 0;">密码</label>
                    <a href="#" style="font-size: 0.8rem; color: #71717a; text-decoration: none;">忘记密码?</a>
                </div>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">登录</button>
        </form>

        <div class="divider">或</div>

        <button class="btn-oauth">
            <svg viewBox="0 0 24 24" style="width: 18px; height: 18px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            继续使用 Google
        </button>
        <button class="btn-oauth">
            <svg fill="currentColor" viewBox="0 0 24 24" style="width: 18px; height: 18px;"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            继续使用 GitHub
        </button>

        <p class="footer-text">
            还没有账号？ <a href="#">免费注册</a>
        </p>
    </div>
</body>
</html>
